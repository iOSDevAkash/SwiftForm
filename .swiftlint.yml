excluded:
  - .build
  - DerivedData
  - Package.swift

opt_in_rules:
  - force_unwrapping
  - force_cast

disabled_rules:
  - trailing_comma
  - opening_brace
  - identifier_name

force_unwrapping: error
force_cast: error

line_length:
  warning: 120
  error: 150
  ignores_urls: true
  ignores_comments: true

type_body_length:
  warning: 300
  error: 500

file_length:
  warning: 500
  error: 1000

function_body_length:
  warning: 50
  error: 100

reporter: xcode
